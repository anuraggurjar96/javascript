<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai or Code </title>
</head>
<body>
    <h1>Chai Or Code</h1>
    <button id ="stop" style = "background-color: blue; border-radius : 8px"; > Stop </button>
    <script>
       const sayAnurag = function() {
        document.querySelector('h1').innerHTML = "Anurag Gurjar"
            //console.log("Anurag");
        }
        const changeMe = setTimeout(sayAnurag,2000)
        document.querySelector('#stop').addEventListener('click',function()
    {
        clearTimeout(changeMe)
        console.log("Stopped")

    })
    </script>
</body>
</html>
